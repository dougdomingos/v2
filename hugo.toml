baseurl = "https://dougdomingos.netlify.app/"
languageCode = "en-us"
theme = "terminal"
enableEmoji = true

[pagination]
    pagerSize = 5

[params]
    # dir name of your main content (default is `content/posts`).
    # the list of set content will show up on your index page (baseurl).
    contentTypeName = "posts"

    # if you set this to 0, only submenu trigger will be visible
    showMenuItems = 4

    # show selector to switch language
    showLanguageSelector = false

    # set theme to full screen width
    fullWidthTheme = false

    # center theme with default width
    centerTheme = true

    # if your resource directory contains an image called `cover.(jpg|png|webp)`,
    # then the file will be used as a cover automatically.
    # With this option you don't have to put the `cover` param in a front-matter.
    autoCover = true

    # set post to show the last updated
    # If you use git, you can set `enableGitInfo` to `true` and then post will automatically get the last updated
    showLastUpdated = false

    # Provide a string as a prefix for the last update date. By default, it looks like this: 2020-xx-xx [Updated: 2020-xx-xx] :: Author
    # updatedDatePrefix = "Updated"

    # whether to show a page's estimated reading time
    readingTime = true # default

    # whether to show a table of contents
    # can be overridden in a page's front-matter
    Toc = true

    # set title for the table of contents
    # can be overridden in a page's front-matter
    TocTitle = "Topics" # default

[languages]
    [languages.en]
        languageName = "English"
        title = "Douglas Domingos :: CompSci@UFCG"

    [languages.en.params]
        subtitle = "Computer Science student at Federal University of Campina Grande (UFCG)"
        owner = "Douglas Domingos"
        keywords = "java, linux, ufcg, computer-science, programming"
        copyright = ""
        menuMore = "Show more"
        readMore = "Read full article"
        readOtherPosts = "Read other posts"
        newerPosts = "Newer posts"
        olderPosts = "Older posts"
        missingContentMessage = "Page not found..."
        missingBackButtonLabel = "Back to home page"
        minuteReadingTime = "min read"
        words = "words"

    [languages.en.params.logo]
        logoText = "@dougdomingos"
        logoHomeLink = "/"

    [languages.en.menu]      
        [[languages.en.menu.main]]
            identifier = "about"
            name = "ABOUT"
            url = "/about"
            weight = 1

        [[languages.en.menu.main]]
            identifier = "experiences"
            name = "EXPERIENCES"
            url = "/experiences"
            weight = 2

        [[languages.en.menu.main]]
            identifier = "projects"
            name = "PROJECTS"
            url = "/projects"
            weight = 3

        [[languages.en.menu.main]]
            identifier = "posts"
            name = "POSTS"
            url = "/posts"
            weight = 4

[build]
    command = "hugo --gc --minify"
    publish = "public"

[build.environment]
    NODE_VERSION = "20"
    HUGO_VERSION = "0.125.0"

[[module.mounts]]
    source = "assets"
    target = "assets"

[[module.mounts]]
    source = "static"
    target = "static"

[[module.mounts]]
    source = "node_modules/@fontsource/jetbrains-mono/files"
    target = "static/fonts"
    includeFiles = [
        "jetbrains-mono-latin-400-normal.woff2",
        "jetbrains-mono-latin-400-italic.woff2",
        "jetbrains-mono-latin-700-normal.woff2"
    ]

[[module.mounts]]
    source = "node_modules/@fontsource/source-serif-4/files"
    target = "static/fonts"
    includeFiles = [
        "source-serif-4-latin-400-normal.woff2",
        "source-serif-4-latin-400-italic.woff2",
        "source-serif-4-latin-700-normal.woff2"
    ]