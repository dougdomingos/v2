{{ $username := .Get "username" }}
{{ $data := .Site.Data.profile.me }}
<div id="profile">
  <img
    id="github-photo"
    src="https://github.com/{{ $username }}.png"
    width="250"
    height="250"
    alt="GitHub profile picture" />
  <div class="profile__info">
    {{ range $data }}
      <div class="profile__info-badge">
        <span class="profile__badge-label">{{ .label }}</span>
        <span>{{ .data }}</span>
      </div>
    {{ end }}
  </div>
</div>
